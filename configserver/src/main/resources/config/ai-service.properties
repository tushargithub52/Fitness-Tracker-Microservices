server.port=8083

# DataSource configuration
spring.mongodb.uri=${MONGODB_AI_URI:mongodb://localhost:27017/AiFitnessRecommendationdb}

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# kafka configuration
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=activity-processor-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer

spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=com.fitnesstracker.aiservice.model.Activity
spring.kafka.consumer.properties.spring.json.trusted.packages=*

kafka.topic.name=activity-events

# Gemini API keys
gemini.api.url=${GEMINI_URL}
gemini.api.key=${GEMINI_KEY}

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always
