# ─────────────────────────────────────────────────────────────
#  FitTrack AI — Full Stack Docker Compose
#  Run: docker-compose up --build
#  Stop: docker-compose down -v
# ─────────────────────────────────────────────────────────────

networks:
  fittrack-network:
    driver: bridge

volumes:
  mysql-data:
  mongodb-data:
  kafka-data:

services:

  # ── Infrastructure ──────────────────────────────────────────

  mysql:
    image: mysql:8.4
    container_name: fittrack-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-fitness_tracker_db}
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - fittrack-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  mongodb:
    image: mongo:7.0
    container_name: fittrack-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - fittrack-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: fittrack-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - fittrack-network

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: fittrack-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - fittrack-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: fittrack-keycloak
    restart: unless-stopped
    command: start-dev
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    ports:
      - "8181:8080"
    networks:
      - fittrack-network
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 60s

  # ── Spring Cloud Infrastructure ─────────────────────────────

  config-server:
    build:
      context: ./configserver
      dockerfile: Dockerfile
    container_name: fittrack-config-server
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      GEMINI_URL: ${GEMINI_URL}
      GEMINI_KEY: ${GEMINI_KEY}
    networks:
      - fittrack-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8888/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s

  eureka-server:
    build:
      context: ./eureka
      dockerfile: Dockerfile
    container_name: fittrack-eureka
    restart: unless-stopped
    ports:
      - "8761:8761"
    networks:
      - fittrack-network
    depends_on:
      config-server:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Business Services ────────────────────────────────────────

  user-service:
    build:
      context: ./userservice
      dockerfile: Dockerfile
    container_name: fittrack-user-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    networks:
      - fittrack-network
    depends_on:
      mysql:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_URL: http://eureka-server:8761/eureka/
      MYSQL_URL: jdbc:mysql://mysql:3306/fitness_tracker_db
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-root}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  activity-service:
    build:
      context: ./activityservice
      dockerfile: Dockerfile
    container_name: fittrack-activity-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    networks:
      - fittrack-network
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      user-service:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_URL: http://eureka-server:8761/eureka/
      MONGODB_ACTIVITY_URI: mongodb://mongodb:27017/aiactivitydb
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092

  ai-service:
    build:
      context: ./aiservice
      dockerfile: Dockerfile
    container_name: fittrack-ai-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    networks:
      - fittrack-network
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_URL: http://eureka-server:8761/eureka/
      MONGODB_AI_URI: mongodb://mongodb:27017/AiFitnessRecommendationdb
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      GEMINI_URL: ${GEMINI_URL}
      GEMINI_KEY: ${GEMINI_KEY}

  api-gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: fittrack-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - fittrack-network
    depends_on:
      user-service:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    environment:
      CONFIG_SERVER_URL: http://config-server:8888
      EUREKA_URL: http://eureka-server:8761/eureka/
      KEYCLOAK_JWK_URI: http://keycloak:8080/realms/FitTrack-AI/protocol/openid-connect/certs

  # ── Frontend ─────────────────────────────────────────────────

  frontend:
    build:
      context: ./Fitness-tracker-frontend
      dockerfile: Dockerfile
    container_name: fittrack-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    networks:
      - fittrack-network
    depends_on:
      - api-gateway
